<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statgully | The Future of Cricket Analytics</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap');

        :root {
            --ipl-blue: #19388A; /* Official IPL Metallic Blue */
            --ipl-gold: #F2C028; /* Professional Sports Gold */
            --deep-navy: #0a1128;
            --text-silver: #e2e8f0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-navy);
            color: var(--text-silver);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            /* Subtle stadium-light gradient */
            background: radial-gradient(circle at top, #1e293b 0%, #0a1128 100%);
        }

        .container {
            padding: 2rem;
            max-width: 800px;
            position: relative;
            z-index: 2;
        }

        .brand-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem;
            margin: 0;
            letter-spacing: 4px;
            color: white;
            text-transform: uppercase;
            line-height: 1;
        }

        .brand-accent {
            color: var(--ipl-gold);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 1rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .status-badge {
            display: inline-block;
            background: rgba(242, 192, 40, 0.1);
            border: 1px solid var(--ipl-gold);
            color: var(--ipl-gold);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider {
            width: 60px;
            height: 4px;
            background: var(--ipl-gold);
            margin: 2rem auto;
            border-radius: 2px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .social-icon {
            color: var(--text-silver);
            font-size: 1.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            opacity: 0.7;
        }

        .social-icon:hover {
            color: var(--ipl-gold);
            transform: scale(1.2);
            opacity: 1;
        }

        /* Abstract Pitch lines for background effect */
        .pitch-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150%;
            height: 150%;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transform: translate(-50%, -50%) rotate(-15deg);
            z-index: 1;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .brand-name { font-size: 3.5rem; }
            h2 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="pitch-effect"></div>
    
    <div class="container">
        <div class="status-badge">In Development</div>
        <h1 class="brand-name">Stat<span class="brand-accent">gully</span></h1>
        <h2>Next-Gen Cricket Intelligence</h2>
        
        <div class="divider"></div>
        
        <p style="font-weight: 300; color: #cbd5e1; max-width: 450px; margin: 0 auto;">
            We are currently engineering the ultimate data-driven experience for the modern fan. <strong>Our web app is arriving shortly.</strong>
        </p>

        <div class="social-links">
            <a href="https://instagram.com/statgully" class="social-icon" target="_blank" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://x.com/statgully" class="social-icon" target="_blank" aria-label="X">
                <i class="fab fa-x-twitter"></i>
            </a>
            <a href="https://reddit.com/r/statgully" class="social-icon" target="_blank" aria-label="Reddit">
                <i class="fab fa-reddit-alien"></i>
            </a>
        </div>
    </div>
</body>
</html>
